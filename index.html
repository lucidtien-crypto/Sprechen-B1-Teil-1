<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 Sprechen - Master Trainer</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --bg: #f8f9fa;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; margin-top: 0; color: var(--primary); }
        
        /* MENU CHỌN BÀI HỌC */
        .lesson-selector {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid var(--info);
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
            background-color: #ebf5fb;
            cursor: pointer;
        }

        .topic-box {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
        }
        
        .settings-panel {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .setting-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        .badge { background: var(--info); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
        
        /* 3 ĐỒNG HỒ */
        .clocks-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        .clock-card {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            flex: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .clock-title { font-size: 0.85rem; text-transform: uppercase; font-weight: bold; color: #7f8c8d; margin-bottom: 10px; }
        .clock-time { font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        .clock-active { border-color: var(--success); background: #eafaf1; }
        .clock-danger { color: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .prep-input { width: 50px; font-size: 1.2rem; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }

        .partner-box {
            min-height: 80px;
            background: #fdf2e9;
            border: 1px dashed #e67e22;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-style: italic;
            text-align: center;
            line-height: 1.5;
            font-size: 1.1rem;
        }
        .btn {
            background: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1rem;
            border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold;
        }
        .btn-start { background: var(--success); }
        .btn-info { background: var(--info); margin-top: 15px; }
        .status { text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; margin-bottom: 10px; }
        
        .dialog-box {
            display: none; background: #f4f6f7; padding: 20px; border-radius: 8px; border-left: 5px solid var(--info);
            margin-top: 15px; font-size: 0.95rem; line-height: 1.6;
        }
        .dialog-title { font-weight: bold; color: var(--primary); margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px;}
        .dialog-a { color: #2980b9; font-weight: bold; }
        .dialog-b { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>B1 Sprechen Trainer</h2>
    
    <!-- MENU CHỌN BÀI HỌC -->
    <select id="lessonSelect" class="lesson-selector" onchange="loadLesson()"></select>
    
    <div class="topic-box" id="topicBox">
        <!-- Đề bài sẽ được tải tự động vào đây -->
    </div>

    <div class="settings-panel">
        <div class="setting-row">
            <strong>Wer fängt an?</strong>
            <label><input type="radio" name="startRole" value="user" checked onchange="generateMusterdialog()"> Ich fange an</label>
            <label><input type="radio" name="startRole" value="partner" onchange="generateMusterdialog()"> Partner fängt an</label>
        </div>
        <div class="setting-row">
            <strong>Gợi ý câu nói:</strong>
            <label><input type="radio" name="hintLevel" value="normal" checked> Cơ bản (B1)</label>
            <label><input type="radio" name="hintLevel" value="advanced"> Nâng cao <span class="badge">B1+</span></label>
        </div>
    </div>

    <div class="status" id="statusDisplay" style="color: var(--primary);">BEREIT</div>

    <div class="clocks-wrapper">
        <div class="clock-card" id="cardPrep">
            <div class="clock-title">Vorbereitung</div>
            <input type="number" id="prepInput" class="prep-input" value="60"> <span style="font-weight:bold;">s</span>
            <div class="clock-time" id="timePrep" style="display:none;">60</div>
        </div>
        <div class="clock-card" id="cardTurn">
            <div class="clock-title">30-Sekunden-Zug</div>
            <div class="clock-time" id="timeTurn">30</div>
        </div>
        <div class="clock-card" id="cardTotal">
            <div class="clock-title">Prüfungszeit</div>
            <div class="clock-time" id="timeTotal">03:00</div>
        </div>
    </div>

    <div class="partner-box" id="partnerDisplay">
        Klicke auf "START", um die Vorbereitungszeit zu beginnen.
    </div>

    <button class="btn btn-start" id="startBtn" onclick="startSystem()">START</button>
    <button class="btn" style="background: #7f8c8d;" onclick="resetSystem()">RESET</button>
    
    <button class="btn btn-info" onclick="toggleDialog()">📖 Musterdialog anzeigen (Hội thoại mẫu)</button>

    <div class="dialog-box" id="sampleDialog">
        <!-- Hội thoại mẫu sẽ được tự động tạo dựa trên bài học và người nói trước -->
    </div>
</div>

<script>
    // =========================================================================
    // KHO DỮ LIỆU BÀI HỌC (DATABASE) - NƠI BẠN SẼ THÊM BÀI 3, 4, 5...
    // =========================================================================
    const lessonsData = {
        "lesson1": {
            title: "Bài 1: Reise nach Köln planen",
            situation: "Sie haben zusammen an einem Wettbewerb teilgenommen und einen einwöchigen Sprachkurs für zwei Personen zusammen gewonnen. Planen Sie gemeinsam die Reise.",
            points: ["Wann?", "Wie hinkommen? (Flug, Bahn...)", "Wo wohnen? (Hotel, bei Familien...)", "Was mitnehmen?"],
            
            // script chứa chính xác 6 bước luân phiên. 
            // Nếu bạn nói trước: Bạn đọc bước 0, 2, 4. AI đọc 1, 3, 5.
            script: [
                { // Bước 0: Bắt đầu & Hỏi thời gian
                 
                    normal: "Hallo! Ich freue mich auf den Kurs. Wann sollen wir fahren?",
                    advanced: "Hallo! Wir haben zusammen an einem Wettbewerb teilgenommen und einen einwöchigen Sprachkurs für zwei Personen zusammen gewonnen. Ich freue mich riesig auf den Sprachkurs. Hast du einen Vorschlag, wann wir fahren sollten?"
                },
                { // Bước 1: Trả lời thời gian & Hỏi phương tiện
                  
                    normal: "Ich schlage vor, im September zu fahren. Wie wollen wir reisen?",
                    advanced: "Eine Möglichkeit wäre meiner Meinung nach, am 1. September zu fahren, weil das Wetter da noch schön ist. Wie sollen wir hinkommen?"
                },
                { // Bước 2: Trả lời phương tiện & Hỏi chỗ ở
                
                    normal: "Wir können mit dem Zug fahren. Wo wollen wir wohnen?",
                    advanced: "Es wäre viel besser, wenn wir mit dem ICE fahren. Das ist umweltfreundlicher und wir können uns unterhalten. Wo wollen wir übernachten?"
                },
                { // Bước 3: Trả lời chỗ ở & Hỏi mang gì
            
                    normal: "Eine Gastfamilie ist gut. Was müssen wir mitnehmen?",
                    advanced: "Ich bin der Meinung, dass eine Gastfamilie die beste Option ist. So lernen wir die Kultur besser kennen. Was sollten wir einpacken?"
                },
                { // Bước 4: Trả lời mang gì & Chia việc
 
                    normal: "Wir müssen Laptops einpacken. Wer kauft die Tickets?",
                    advanced: "Ich würde vorschlagen, nicht nur Laptops, sondern auch eine warme Jacke und einen Regenschirm mitzunehmen. Soll ich die Tickets buchen?"
                },
                { // Bước 5: Chốt hạ
					normal: "Abgemacht! Ich suche die Unterkunft. Bis bald!",
                    advanced: "Genau, so machen wir das! Ich übernehme die Suche nach der Unterkunft. Ich bin überzeugt, dass wir mit guter Planung alles schaffen würden, und das ist unser Ziel.Ich freue mich schon darauf!"
                }
            ]
        },
        
        "lesson2": {
            title: "Bài 2: Soziales Projekt",
            situation: "Sie möchten mit Ihrer Partnerin/Ihrem Partner ein soziales Projekt organisieren, um kinderreichen Familien zu helfen.",
            points: ["Wie können helfen? (Geld / Kleidung...)", "Wie sammeln Hilfsleistungen?", "Wer kann auch teilnehmen?", "Medien informieren"],
            script: [
                {
                 
                    normal: "Hallo! Ich möchte das Projekt machen. Wie können wir helfen?",
                    advanced: "Hallo! Um kinderreichen Familien zu helfen,  finde ich das soziale Projekt sehr sinnvoll. Hast du einen Vorschlag, wie wir den Familien helfen könnten?"
                },
                {
              
                    normal: "Ich schlage vor, Kleidung zu geben. Wie sammeln wir das?",
                    advanced: "Eine Möglichkeit wäre meiner Meinung nach, warme Kleidung und Spielzeuge zu sammeln, weil sie das dringend brauchen. Wie sollen wir die Hilfsleistungen sammeln?"
                },
                {
                  
                    normal: "Wir können eine Kiste in der Schule aufstellen. Wer kann auch teilnehmen?",
                    advanced: "Es wäre viel besser, wenn wir eine große Spendenkiste in der Sprachschule aufstellen. Das ist sehr praktisch. Wer kann noch an der Aktion teilnehmen?"
                },
                {
                  
                    normal: "Unsere Freunde können mitmachen. Wie informieren wir die Medien?",
                    advanced: "Ich bin der Meinung, dass unsere Kurskollegen und Lehrer die beste Option sind, um uns zu unterstützen. Wie sollen wir die Leute informieren?"
                },
                {
               
                    normal: "Wir schreiben auf Facebook. Wer macht was?",
                    advanced: "Ich würde vorschlagen, nicht nur auf Facebook zu posten, sondern auch eine Nachricht in die WhatsApp-Gruppe zu schreiben. Soll ich den Text schreiben?"
                },
                {
                
                    normal: "Abgemacht! Ich besorge die Kiste. Bis dann!",
                    advanced: "Genau, so machen wir das! Ich übernehme die Spendenkiste. Ich freue mich schon auf das Projekt!"
                }
            ]
        },
        // 👉 ĐỂ THÊM BÀI 3, BẠN CHỈ CẦN COPY BLOCK TỪ "lesson2" XUỐNG ĐÂY VÀ ĐỔI NỘI DUNG
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		
		//---------------------------------------------------6
		"lesson6": {
            title: "Bài 6: Kinderprogramm organisieren",
            situation: "Am Samstag ist der Kindertag. Da Sie Kinder sehr lieben, möchten Sie ein Kinderfest für sie organisieren.",
            points: ["Was machen (Spiele)?", "Essen, Getränke?", "Vorbereitung", "Wer hilft?"],
            script: [
                {
                    normal: "Hallo! Am Samstag ist Kindertag. Wir wollen ein Fest organisieren. Welche Spiele sollen wir machen?",
                    advanced: "Hallo! Am Samstag ist ja Kindertag. Da wir Kinder sehr lieben, finde ich ein Kinderfest eine tolle Idee. Hast du einen Vorschlag, was für Spiele wir machen könnten?"
                },
                {
                    normal: "Wir können Verstecken spielen. Was wollen wir essen und trinken?",
                    advanced: "Eine Möglichkeit wäre meiner Meinung nach, Verstecken zu spielen oder ein Quiz zu machen, weil Kinder das immer lustig finden. Was sollen wir als Essen und Getränke anbieten?"
                },
                {
                    normal: "Wir können Pizza und Apfelsaft kaufen. Wann sollen wir alles vorbereiten?",
                    advanced: "Es wäre viel besser, wenn wir Pizza bestellen und Apfelsaft mitbringen. Das ist sehr praktisch. Wann sollen wir mit der Vorbereitung anfangen?"
                },
                {
                    normal: "Wir können am Freitag anfangen. Wer kann uns helfen?",
                    advanced: "Ich bin der Meinung, dass wir schon am Freitagnachmittag anfangen sollten, um alles in Ruhe zu organisieren. Wer kann uns dabei helfen?"
                },
                {
                    normal: "Unsere Freunde und die Eltern können helfen. Soll ich die Einladungen schreiben?",
                    advanced: "Ich würde vorschlagen, nicht nur unsere Freunde zu fragen, sondern auch die Eltern einzuladen. Soll ich die Einladungen schreiben?"
                },
                {
                    normal: "Abgemacht! Ich kaufe das Essen. Bis bald!",
                    advanced: "Genau, so machen wir das! Ich übernehme das Essen und die Getränke. Ich freue mich schon auf das Fest!"
                }
            ]
        }
    };

    // =========================================================================
    // LOGIC HỆ THỐNG
    // =========================================================================
    let currentLessonId = "lesson1";
    let mainInterval = null;
    let phase = "idle";
    let prepSecs = 60, turnSecs = 30, totalSecs = 180;
    let isUserTurn = true;
    let globalStepIndex = 0; // Luôn tiến tới 0,1,2,3,4,5
    let userStarts = true;

    window.onload = () => {
        const select = document.getElementById('lessonSelect');
        for (let key in lessonsData) {
            let option = document.createElement('option');
            option.value = key;
            option.innerText = lessonsData[key].title;
            select.appendChild(option);
        }
        loadLesson();
        if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }
    };

    function loadLesson() {
        currentLessonId = document.getElementById('lessonSelect').value;
        const data = lessonsData[currentLessonId];
        
        let pointsHTML = data.points.map(p => `<li>${p}</li>`).join('');
        document.getElementById('topicBox').innerHTML = `
            <strong>Situation:</strong> ${data.situation}
            <ul style="padding-left: 20px; margin: 5px 0 0 0;">${pointsHTML}</ul>
        `;
        resetSystem();
        generateMusterdialog();
    }

    // Tự động tạo hội thoại mẫu dựa trên Bài học và ai là người bắt đầu
   // Cập nhật lại hàm này trong thẻ <script>
	function generateMusterdialog() {
		const data = lessonsData[currentLessonId];
		userStarts = document.querySelector('input[name="startRole"]:checked').value === "user";
		
		let htmlNormal = `<div class="dialog-title">Musterdialog (Mức độ Cơ bản - B1)</div>`;
		let htmlAdvanced = `<div class="dialog-title">Musterdialog (Mức độ Nâng cao - B1+)</div>`;

		for (let i = 0; i < data.script.length; i++) {
			// Xác định dòng này là của User hay Partner
			let isUserLine = (userStarts && i % 2 === 0) || (!userStarts && i % 2 !== 0);
			
			// Xác định tên người nói và màu sắc (class CSS) tương ứng
			let speaker = isUserLine ? "Du" : "Partner";
			let cssClass = isUserLine ? "dialog-a" : "dialog-b";

			// FIX: Sử dụng .normal và .advanced cho CẢ HAI bên để hiển thị trọn vẹn kịch bản học tập
			htmlNormal += `<p><span class="${cssClass}">${speaker}:</span> ${data.script[i].normal}</p>`;
			htmlAdvanced += `<p><span class="${cssClass}">${speaker}:</span> ${data.script[i].advanced}</p>`;
		}
		
		document.getElementById('sampleDialog').innerHTML = htmlNormal + htmlAdvanced;
	}

    function toggleDialog() {
        const dialog = document.getElementById("sampleDialog");
        dialog.style.display = dialog.style.display === "block" ? "none" : "block";
    }

    function startSystem() {
        if (phase !== "idle") return;
        
        // --- THÊM 3 DÒNG NÀY ĐỂ MỞ KHÓA GIỌNG NÓI ---
        if ('speechSynthesis' in window) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
        }
        // -------------------------------------------
        
        prepSecs = parseInt(document.getElementById('prepInput').value) || 60;
        turnSecs = 30;
        totalSecs = 180; 
        globalStepIndex = 0; 
        userStarts = document.querySelector('input[name="startRole"]:checked').value === "user";
        
        document.getElementById('prepInput').style.display = "none";
        document.getElementById('timePrep').style.display = "block";
        document.getElementById('timePrep').innerText = prepSecs;
        
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').style.opacity = "0.5";
        
        phase = "prep";
        document.getElementById('statusDisplay').innerText = "VORBEREITUNG...";
        document.getElementById('statusDisplay').style.color = "var(--warning)";
        document.getElementById('cardPrep').classList.add("clock-active");
        
        mainInterval = setInterval(tick, 1000);
    }

    function tick() {
        if (phase === "prep") {
            prepSecs--;
            document.getElementById('timePrep').innerText = prepSecs;
            
            if (prepSecs <= 0) {
                phase = "exam";
                document.getElementById('cardPrep').classList.remove("clock-active");
                playLongBeep();
                setupTurn();
            }
        } 
        else if (phase === "exam") {
            totalSecs--;
            let m = Math.floor(totalSecs / 60);
            let s = totalSecs % 60;
            document.getElementById('timeTotal').innerText = `0${m}:${s < 10 ? '0'+s : s}`;
            
            if (totalSecs <= 30) document.getElementById('timeTotal').classList.add("clock-danger");
            if (totalSecs <= 0) { endExam(); return; }

            turnSecs--;
            document.getElementById('timeTurn').innerText = turnSecs;
            if (turnSecs <= 5) document.getElementById('timeTurn').classList.add("clock-danger");

            if (turnSecs <= 0) {
                globalStepIndex++; 
                turnSecs = 30;
                document.getElementById('timeTurn').classList.remove("clock-danger");
                document.getElementById('timeTurn').innerText = turnSecs;
                
                playBeep();
                setupTurn();
            }
        }
    }

   function setupTurn() {
        const data = lessonsData[currentLessonId];
        document.getElementById('cardTurn').classList.add("clock-active");
        document.getElementById('cardTotal').classList.add("clock-active");
        
        if (globalStepIndex >= data.script.length) {
            document.getElementById('partnerDisplay').innerHTML = `<strong>Wir sind fertig! (Kế hoạch đã xong, chờ hết giờ).</strong>`;
            return;
        }

        // Logic phân vai Ping-Pong
        let isUserTurnNow = (userStarts && globalStepIndex % 2 === 0) || (!userStarts && globalStepIndex % 2 !== 0);
        let stepData = data.script[globalStepIndex];
        
        // Lấy mức độ gợi ý người dùng đang chọn
        let level = document.querySelector('input[name="hintLevel"]:checked').value;

        if (isUserTurnNow) {
            document.getElementById('statusDisplay').innerText = "DU SPRICHST...";
            document.getElementById('statusDisplay').style.color = "var(--success)";
            
            let hintText = (level === 'advanced') ? stepData.advanced : stepData.normal;

            document.getElementById('partnerDisplay').innerHTML = `
                <strong style="color:#27ae60">Gợi ý cho bạn (${level === 'advanced' ? 'Nâng cao' : 'Cơ bản'}):</strong><br><br>
                ${hintText}
            `;
        } else {
            document.getElementById('statusDisplay').innerText = "PARTNER SPRICHT...";
            document.getElementById('statusDisplay').style.color = "var(--accent)";
            
            // Xóa bỏ biến .ai, AI sẽ dùng trực tiếp câu normal hoặc advanced theo cài đặt
            let reply = (level === 'advanced') ? stepData.advanced : stepData.normal;
            
            document.getElementById('partnerDisplay').innerHTML = `<strong>Partner (AI):</strong><br><br>${reply}`;
            
            // Hệ thống vẫn lấy câu reply này để phát âm như bình thường
            speakGermanMale(reply); 
        }
    }

    function speakGermanMale(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.rate = 0.95;
            
            const voices = window.speechSynthesis.getVoices();
            const deVoices = voices.filter(v => v.lang.startsWith('de'));
            let maleVoice = deVoices.find(v => 
                v.name.includes('Google') || v.name.toLowerCase().includes('male') || 
                v.name.toLowerCase().includes('männlich') || v.name.includes('Conrad') || v.name.includes('Stefan')
            );
            
            if (maleVoice) utterance.voice = maleVoice;
            else if (deVoices.length > 0) utterance.voice = deVoices[0];
            
            window.speechSynthesis.speak(utterance);
        }
    }

    function endExam() {
        clearInterval(mainInterval);
        phase = "finished";
        document.getElementById('statusDisplay').innerText = "PRÜFUNG BEENDET";
        document.getElementById('statusDisplay').style.color = "var(--primary)";
        document.getElementById('partnerDisplay').innerText = "Hết 3 phút! Bạn đã hoàn thành bài thi xuất sắc.";
        
        document.getElementById('cardTurn').classList.remove("clock-active");
        document.getElementById('timeTurn').classList.remove("clock-danger");
        document.getElementById('timeTurn').innerText = "--";
        document.getElementById('timeTotal').innerText = "00:00";
        playSuccessSound();
    }

    function resetSystem() {
        clearInterval(mainInterval);
        phase = "idle";
        globalStepIndex = 0;
        
        document.getElementById('prepInput').style.display = "inline-block";
        document.getElementById('timePrep').style.display = "none";
        document.getElementById('timeTurn').innerText = "30";
        document.getElementById('timeTurn').classList.remove("clock-danger");
        document.getElementById('timeTotal').innerText = "03:00";
        document.getElementById('timeTotal').classList.remove("clock-danger");
        document.getElementById('cardPrep').classList.remove("clock-active");
        document.getElementById('cardTurn').classList.remove("clock-active");
        document.getElementById('cardTotal').classList.remove("clock-active");
        
        document.getElementById('statusDisplay').innerText = "BEREIT";
        document.getElementById('statusDisplay').style.color = "var(--primary)";
        document.getElementById('partnerDisplay').innerText = "Klicke auf 'START', um die Vorbereitungszeit zu beginnen.";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').style.opacity = "1";
        
        if(window.speechSynthesis) window.speechSynthesis.cancel();
    }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
    }

    function playLongBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.setValueAtTime(600, ctx.currentTime);
